name: VernacularApp
options:
  bundleIdPrefix: com.hedgeinc.vernacular
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

configs:
  Debug: debug
  Release: release

targets:
  VernacularApp:
    type: application
    platform: iOS
    sources:
      - VernacularApp
    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hedgeinc.vernacular
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: VernacularApp/Info.plist
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""  # Set this in Xcode to your Hedge Inc. team ID
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Privacy manifest required for TestFlight / App Store submission
        GENERATE_INFOPLIST_FILE: NO
        # SUPABASE_URL and SUPABASE_ANON_KEY come from Configs/Debug.xcconfig
        # (Debug) or Configs/Release.xcconfig (Release). Edit those files locally;
        # do NOT commit real secrets.
    dependencies:
      - package: Supabase
        product: Supabase
    info:
      path: VernacularApp/Info.plist
      properties:
        CFBundleDisplayName: Vernacular
        CFBundleName: VernacularApp
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: VernacularLogo
          UIImageRespectsSafeAreaInsets: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSFaceIDUsageDescription: Vernacular uses Face ID to sign you in securely without a password.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        SUPABASE_URL: $(SUPABASE_URL)
        SUPABASE_ANON_KEY: $(SUPABASE_ANON_KEY)
